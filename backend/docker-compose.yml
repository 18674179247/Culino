services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: culino
      POSTGRES_PASSWORD: culino_password
      POSTGRES_DB: culino_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ROOT_USER: minioadmin
      RUSTFS_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfsdata:/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://culino:culino_password@db:5432/culino_db
      REDIS_URL: redis://redis:6379
      RUN_MODE: production
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      SERVER_ADDR: 0.0.0.0:3000
      LOG_LEVEL: info
      LOG_DIR: logs
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_BUCKET: culino
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      - db
      - redis
      - rustfs

volumes:
  pgdata:
  redisdata:
  rustfsdata:
