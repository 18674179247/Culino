# ==========================================================================
# Culino 生产环境 Nginx 配置
# 放置到: /etc/nginx/sites-available/culino.conf
# 启用:  sudo ln -s /etc/nginx/sites-available/culino.conf /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# 申请证书: sudo certbot --nginx -d your-domain.com
#
# 注意：limit_req_zone 必须定义在 http {} 上下文中。
# 如果你的 nginx.conf 使用 sites-enabled include，请把下面两行复制到 /etc/nginx/nginx.conf
# 的 http {} 块里，或放进 /etc/nginx/conf.d/limits.conf。
# ==========================================================================

# ---------- 限流区域（粗粒度 DDoS 防护，app 层 governor 做精细限流）----------
# 通用 API：每个 IP 30 req/s（含突发）
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
# 登录/注册：每个 IP 5 req/min（防暴力破解）
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
# 连接并发数：同一 IP 最多 20 个并发连接
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# HTTP → HTTPS 跳转，同时保留 certbot 验证路径
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.com;

    # ---------- TLS ----------
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---------- 安全头 ----------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 并发连接限制 ----------
    limit_conn conn_zone 20;

    # ---------- 请求体上限 ----------
    # 后端 upload 路由限制 16MB，这里给 20MB 余量
    client_max_body_size 20M;

    # ---------- 压缩 ----------
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---------- Web 前端静态资源 ----------
    root /var/www/culino-web;
    index index.html;

    # wasm 必须带正确 MIME，否则浏览器拒绝执行
    location ~ \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 带 hash 的静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html 不缓存，保证前端更新能即时生效
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 后端 API 反向代理 ----------
    # 登录/注册单独走严格限流（防暴力破解）
    location = /api/v1/user/login {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/v1/user/register {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 请求（DeepSeek）可能较慢，放宽超时
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # 健康检查（供外部监控使用，可按需限制来源 IP）
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }

    # ---------- 拒绝访问隐藏文件 ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
