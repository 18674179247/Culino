name: iosApp
options:
  bundleIdPrefix: com.culino
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_NAME: Culino
        PRODUCT_BUNDLE_IDENTIFIER: com.culino.app
        INFOPLIST_FILE: iosApp/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    preBuildScripts:
      - name: Compile Kotlin Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
